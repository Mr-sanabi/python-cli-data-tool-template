<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Python CLI Data Tool Template</title>
  <desc id="desc">Reusable CLI scaffolding, file helpers, tests, and automation patterns.</desc>
  <defs>
    <linearGradient id="top" x1="0" x2="1">
      <stop offset="0" stop-color="#4dabf7"/>
      <stop offset="0.5" stop-color="#40c057"/>
      <stop offset="1" stop-color="#f0ad4e"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#263445" stroke-width="1" opacity="0.28"/>
    </pattern>
  </defs>
  <rect width="1200" height="360" rx="24" fill="#0b1118"/>
  <rect x="26" y="26" width="1148" height="308" rx="20" fill="#101923"/>
  <rect x="26" y="26" width="1148" height="4" rx="2" fill="url(#top)"/>
  <rect x="26" y="30" width="1148" height="304" fill="url(#grid)" opacity="0.7"/>

  <text x="86" y="92" fill="#8fb3d9" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="3">PYTHON DEVELOPER TOOLKIT</text>
  <text x="86" y="142" fill="#ffffff" font-family="Arial, sans-serif" font-size="40" font-weight="700">Python CLI Data Tool Template</text>
  <text x="86" y="178" fill="#8ed0ff" font-family="Arial, sans-serif" font-size="18">Reusable scaffolding and copy-friendly helpers for compact data tools.</text>

  <g font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">
    <rect x="86" y="218" width="142" height="38" rx="19" fill="#111c27" stroke="#2a3b4d"/>
    <text x="157" y="242" fill="#dbeafe">argparse</text>
    <rect x="242" y="218" width="142" height="38" rx="19" fill="#111c27" stroke="#2a3b4d"/>
    <text x="313" y="242" fill="#dbeafe">CSV · JSON</text>
    <rect x="398" y="218" width="142" height="38" rx="19" fill="#111c27" stroke="#2a3b4d"/>
    <text x="469" y="242" fill="#dbeafe">SQLite</text>
  </g>

  <rect x="720" y="72" width="390" height="210" rx="20" fill="#101f2a" stroke="#2b3c4c"/>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="752" y="105" width="92" height="58" rx="12" fill="#10273b" stroke="#4dabf7"/>
    <text x="798" y="130" fill="#67b7ff" font-size="13" font-weight="700">SCAFFOLD</text>
    <text x="798" y="149" fill="#c9d8e7" font-size="10">src + tests</text>
    <text x="866" y="140" fill="#718096" font-size="27">→</text>
    <rect x="888" y="105" width="92" height="58" rx="12" fill="#102b1d" stroke="#40c057"/>
    <text x="934" y="130" fill="#51cf66" font-size="13" font-weight="700">ADAPT</text>
    <text x="934" y="149" fill="#c9d8e7" font-size="10">your logic</text>
    <text x="1002" y="140" fill="#718096" font-size="27">→</text>
    <rect x="1024" y="105" width="60" height="58" rx="12" fill="#302315" stroke="#f0ad4e"/>
    <text x="1054" y="130" fill="#f6bd60" font-size="12" font-weight="700">SHIP</text>
    <text x="1054" y="149" fill="#c9d8e7" font-size="10">CLI</text>
  </g>

  <rect x="752" y="190" width="332" height="58" rx="11" fill="#0c111b" stroke="#243242"/>
  <circle cx="776" cy="211" r="5" fill="#40c057"/>
  <text x="790" y="216" fill="#b8c8d8" font-family="Arial, sans-serif" font-size="12">working starter template</text>
  <text x="1056" y="216" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="end">1</text>
  <circle cx="776" cy="231" r="5" fill="#4dabf7"/>
  <text x="790" y="236" fill="#b8c8d8" font-family="Arial, sans-serif" font-size="12">tested helper groups</text>
  <text x="1056" y="236" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="700" text-anchor="end">7</text>
</svg>
